name: Upstream Drift Detection

# Weekly check: does the patcher still apply against latest upstream?
# - Anchors still match → open a PR bumping meshtastic-firmware-pin.
# - Anchors fail → open an issue tagged upstream-drift listing failures.
# See docs/tdd-issue-002-captains-compass.md §5.3.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: upstream-drift
  cancel-in-progress: false

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned SHA
        id: pin
        run: echo "current=$(cat meshtastic-firmware-pin)" >> "$GITHUB_OUTPUT"

      - name: Resolve latest upstream develop SHA
        id: upstream
        run: |
          LATEST=$(git ls-remote https://github.com/meshtastic/firmware.git refs/heads/develop | awk '{print $1}')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Current pin: ${{ steps.pin.outputs.current }}"
          echo "Latest develop: $LATEST"

      - name: Skip if pin already at latest
        id: skip
        run: |
          if [[ "${{ steps.pin.outputs.current }}" == "${{ steps.upstream.outputs.latest }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Pin is already at upstream HEAD; nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.skip.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build cc-builder against latest upstream
        if: steps.skip.outputs.skip == 'false'
        id: build
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: cc-builder:drift
          build-args: |
            FIRMWARE_SHA=${{ steps.upstream.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dry-run patcher against latest upstream
        if: steps.skip.outputs.skip == 'false' && steps.build.outcome == 'success'
        id: dryrun
        continue-on-error: true
        run: |
          docker run --rm cc-builder:drift bash -c \
            "cd /firmware-src && rsync -a /overlay/ . && python3 /patches/apply.py --dry-run" \
            2>&1 | tee dryrun.log

      - name: Verify full build against latest upstream
        if: steps.skip.outputs.skip == 'false' && steps.dryrun.outcome == 'success'
        id: fullbuild
        continue-on-error: true
        run: |
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" cc-builder:drift 2>&1 | tee build.log

      - name: Open PR bumping pin (drift compatible)
        if: steps.skip.outputs.skip == 'false' && steps.fullbuild.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump firmware pin to ${{ steps.upstream.outputs.latest }}"
          branch: chore/bump-firmware-pin-${{ github.run_number }}
          delete-branch: true
          title: "chore: bump firmware pin to ${{ steps.upstream.outputs.latest }}"
          body: |
            Automatic pin bump from upstream-drift workflow.

            **From:** [`${{ steps.pin.outputs.current }}`](https://github.com/meshtastic/firmware/commit/${{ steps.pin.outputs.current }})
            **To:** [`${{ steps.upstream.outputs.latest }}`](https://github.com/meshtastic/firmware/commit/${{ steps.upstream.outputs.latest }})

            All patcher anchors still match; full build succeeded.
          labels: upstream-drift
          add-paths: meshtastic-firmware-pin

      - name: Update pin file
        if: steps.skip.outputs.skip == 'false' && steps.fullbuild.outcome == 'success'
        run: printf "%s\n" "${{ steps.upstream.outputs.latest }}" > meshtastic-firmware-pin

      - name: File drift issue (anchors moved)
        if: steps.skip.outputs.skip == 'false' && (steps.dryrun.outcome == 'failure' || steps.build.outcome == 'failure' || steps.fullbuild.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dryrun = fs.existsSync('dryrun.log') ? fs.readFileSync('dryrun.log', 'utf8') : '(dry-run did not produce a log)';
            const build = fs.existsSync('build.log') ? fs.readFileSync('build.log', 'utf8') : '(full build did not run)';
            const body = [
              `Automatic upstream-drift report.`,
              ``,
              `Current pin: \`${{ steps.pin.outputs.current }}\``,
              `Latest upstream develop: \`${{ steps.upstream.outputs.latest }}\``,
              ``,
              `Patcher dry-run / full build failed against upstream HEAD. Investigate which anchor moved and update \`patches/apply.py\`.`,
              ``,
              `### Dry-run output`,
              '```',
              dryrun.slice(-3000),
              '```',
              ``,
              `### Full build output (tail)`,
              '```',
              build.slice(-3000),
              '```',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream drift: patcher fails against ${{ steps.upstream.outputs.latest }}`,
              body,
              labels: ['upstream-drift'],
            });
