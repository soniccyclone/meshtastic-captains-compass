name: Release T114 Firmware

# Push to main → CalVer prerelease with firmware.uf2 attached.
# See docs/tdd-issue-002-captains-compass.md §5.1.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned firmware SHA
        id: pin
        run: echo "sha=$(cat meshtastic-firmware-pin)" >> "$GITHUB_OUTPUT"

      - name: Compute CalVer tag
        id: tag
        run: echo "tag=v$(date -u +%Y.%m.%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cc-builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: cc-builder:release
          build-args: |
            FIRMWARE_SHA=${{ steps.pin.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compile T114 firmware
        run: |
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" cc-builder:release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Captain's Compass ${{ steps.tag.outputs.tag }}"
          prerelease: true
          generate_release_notes: true
          body: |
            ## Captain's Compass ${{ steps.tag.outputs.tag }}

            Built against meshtastic/firmware [`${{ steps.pin.outputs.sha }}`](https://github.com/meshtastic/firmware/commit/${{ steps.pin.outputs.sha }}).

            ### Heltec Mesh Node T114 (nRF52840)

            Flash `firmware.uf2` via the UF2 bootloader:

            1. Double-press reset on the T114 — a USB drive (`T114_BOOT`) appears.
            2. Drag `firmware.uf2` onto that drive.
            3. The device flashes and reboots.
          files: |
            output/firmware.uf2
            output/firmware-heltec-mesh-node-t114-*.uf2
