name: PR Build T114 Firmware

# Per-PR firmware build. Uploads firmware.uf2 as a workflow artifact
# (NOT a GitHub Release — releases happen only on merge to main, via
# release.yml). Comments a download link on the PR for QA.
# See docs/tdd-issue-002-captains-compass.md §5.2.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'firmware-overlay/**'
      - 'patches/**'
      - 'docker/**'
      - 'meshtastic-firmware-pin'
      - '.github/workflows/pr-build-t114.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-build-t114-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rc-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned firmware ref
        id: pin
        run: echo "ref=$(cat meshtastic-firmware-pin)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cc-builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: cc-builder:pr
          build-args: |
            FIRMWARE_REF=${{ steps.pin.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compile T114 firmware
        run: |
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" cc-builder:pr

      - name: Upload firmware artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-pr${{ github.event.pull_request.number }}-${{ github.run_number }}
          path: |
            output/firmware.uf2
            output/firmware-heltec-mesh-node-t114-*.uf2
          if-no-files-found: error
          retention-days: 30

      - name: Comment on PR with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactName = `firmware-pr${context.payload.pull_request.number}-${context.runNumber}`;
            const ref = '${{ steps.pin.outputs.ref }}';
            const body = [
              `**PR firmware build ready** — \`${artifactName}\``,
              ``,
              `Built against meshtastic/firmware [\`${ref}\`](https://github.com/meshtastic/firmware/tree/${ref}) at PR HEAD (${context.payload.pull_request.head.sha}).`,
              ``,
              `[Download from the workflow run](${runUrl}) (scroll to "Artifacts" at the bottom). Unzip → flash \`firmware.uf2\` to T114 via double-press reset + drag onto \`T114_BOOT\` drive.`,
              ``,
              `_Artifact retained 30 days. No release published — those happen on merge to main._`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
